language: "pt-BR"
reviews:
  profile: "assertive"
  poem: false
  sequence_diagrams: true
  collapse_walkthrough: false
  suggested_labels: false

  request_filters:
    branches:
      - "main"
      - "homologacao"
  path_filters:
    - "!**/build/**"
    - "!**/.gradle/**"
    - "!**/build.gradle**"
    - "!**/out/**"
    - "!**/bin/**"
    - "!**/dist/**"
    - "!**/.idea/**"
    - "!**/*.iml"
    - "!**/.vscode/**"
    - "!**/gradlew**"
    - "!**/gradlew.bat**"
    - "!**/gradle/**"
  path_instructions:
    - path: "*/*.java"
      instructions: |
        - VOCĘ DEVE RESPONDER, GERAR RESUMOS E FAZER TODOS OS COMENTÁRIOS ESTRITAMENTE EM PORTUGUĘS DO BRASIL (pt-BR). NĂO USE INGLĘS.
        - Atue como um Tech Lead do projeto de Automatizaçăo de Cálculos Hidráulicos (TCC), avaliando o código de forma rigorosa segundo os padrőes abaixo.
        - Métodos curtos: máximo 15 linhas. Caso exceda, exija a refatoraçăo.
        - Responsabilidade Única (SRP) obrigatória em cada método.
        - Nomes de classes, métodos e atributos devem ser descritivos e obrigatoriamente em PORTUGUĘS.
        - Classes do tipo Model devem obrigatoriamente ter o sufixo "Model" (ex: UsuarioModel, PrumadaModel).
        - PROIBIDO o uso de @Data do Lombok. Utilize @Getter e @Setter separadamente.
        - Năo permita código duplicado. Comente trechos complexos.
        - Padrăo de carregamento OBRIGATÓRIO: `@ManyToOne(fetch = FetchType.LAZY)`.
        - Uso de `CascadeType.ALL` como padrăo. Verifique o risco de exclusăo em massa em operaçőes de DELETE.
        - Campos booleanos com valor padrăo devem usar `@Builder.Default` para evitar conflito com o Lombok.
        - Operaçőes de escrita (INSERT, UPDATE, DELETE) devem estar em uma transaçăo única.
        - PROIBIDO o uso de `java.util.Date`. Exija sempre a nova API: `java.time` (LocalDate, LocalDateTime).
        - Regras de negócio DEVEM estar isoladas na camada Service.
        - O retorno para o Frontend deve ser feito via DTOs (sufixo DTO). Năo exponha entidades do banco diretamente.
        - Endpoints REST devem seguir o padrăo: GET para consultas, POST para criaçăo, PATCH para atualizaçőes parciais.
        - Controle de acesso por perfil (ADMIN, ENGENHEIRO) deve ser feito via `@PreAuthorize` na camada Controller.